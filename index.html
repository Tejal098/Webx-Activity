<!DOCTYPE html>
<html>

<head>
    <title>Blog Platform</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>Blogging Platform</h1>

    <div class="buttons">
        <button onclick="show('writer')">Writer</button>
        <button onclick="show('reader')">Reader</button>
        <button onclick="show('admin')">Admin</button>
    </div>


    <div id="writer" class="box">

        <h2>Writer Dashboard</h2>

        <input type="text" id="title" placeholder="Blog Title">

        <div id="content" class="editor" contenteditable="true">
        </div>

        <button onclick="addBlog()">
            Publish Blog
        </button>

    </div>


    <div id="reader" class="box hide">

        <h2>Reader Dashboard</h2>

        <div id="blogs"></div>

    </div>


    <div id="admin" class="box hide">

        <h2>Admin Dashboard</h2>

        <div id="adminBlogs"></div>

    </div>

    <script src="script.js"></script>

</body>

</html>
